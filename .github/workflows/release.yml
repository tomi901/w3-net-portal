name: Release

on:
  push:
    tags: v[0-9]+\.[0-9]+\.[0-9]+.*

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: ./build.sh
    - name: Create tar file
      run: cd dist && tar -czf w3-net-portal-cli.tar.gz ./w3-net-portal-cli
